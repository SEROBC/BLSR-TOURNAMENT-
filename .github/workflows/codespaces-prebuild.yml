name: Codespaces Prebuild

on:
  push:
    branches:
      - main

jobs:

  prebuild:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Containers
        run: |
          docker-compose build
