name: Backend CI

on:
  push:
    branches:
      - main
      - develop

jobs:

  backend-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - matchmaking-service
          - settlement-service
          - stripe-service
          - wallet-service
          - fraud-engine

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          cd backend/${{ matrix.service }}
          npm install

      - name: Run Tests
        run: |
          cd backend/${{ matrix.service }}
          npm test
