name: Backend CI

on:
  push:
    branches:
      - main

jobs:

  backend-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - matchmaking-service
          - wallet-service
          - stripe-service
          - settlement-service
          - replay-service
          - spectator-service
          - compliance-service
          - anti-cheat-service
          - tournament-service

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: |
          cd backend/${{ matrix.service }}
          npm install

      - run: |
          cd backend/${{ matrix.service }}
          npm test          npm install

      - name: Run Tests
        run: |
          cd backend/${{ matrix.service }}
          npm test
